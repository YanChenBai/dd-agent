packages:
  - apps/*
  - packages/*

# Install only the schema implementation selected by each workspace package.
autoInstallPeers: false

catalog:
  '@ai-sdk/openai-compatible': ^3.0.5
  '@oxc-node/core': ^0.1.0
  '@t3-oss/env-core': ^0.13.11
  '@types/node': ^24.13.2
  '@vitejs/plugin-vue': ^6.0.7
  '@viyuni/bevent-relay': ^0.0.4
  '@vue-tui/runtime': ^0.1.1
  '@vue-tui/vite': ^0.2.0
  ai: ^7.0.14
  dotenv: ^17.4.2
  ky: ^2.0.2
  nanoevents: ^9.1.0
  p-queue: ^9.3.1
  sharp: ^0.35.3
  sherpa-onnx: ^1.13.3
  sherpa-onnx-node: ^1.13.3
  typescript: ^5.9.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.2.2
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vue: ^3.5.39
  zod: ^4.4.3

catalogMode: prefer
overrides:
  vite: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
