packages:
  - apps/*
  - packages/*

catalog:
  '@oxc-node/core': ^0.1.0
  "@types/node": ^24
  openai: ^6.45.0
  sherpa-onnx-node: ^1.13.3
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
